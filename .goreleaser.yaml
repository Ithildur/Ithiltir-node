version: 2

project_name: Ithiltir-node

release:
  name_template: '{{ .Tag }}'
  prerelease: auto
  make_latest: '{{ if .Prerelease }}false{{ else }}true{{ end }}'

checksum:
  name_template: 'Ithiltir-node-checksums.txt'

snapshot:
  version_template: '{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}'

dist: build

builds:
  - id: node
    dir: .
    main: ./cmd/node
    builder: go
    tool: go
    command: build

    targets:
      - linux_amd64_v1
      - linux_arm64_v8.0
      - windows_amd64_v1
      - windows_arm64_v8.0
      - darwin_arm64_v8.0

    env:
      - CGO_ENABLED=0

    flags:
      - -trimpath
    ldflags:
      - -s -w -X Ithiltir-node/internal/app.Version={{ if .Env.VERSION }}{{ .Env.VERSION }}{{ else }}{{ .Version }}{{ end }}

    binary: node
  - id: runner
    dir: .
    main: ./cmd/runner
    builder: go
    tool: go
    command: build

    targets:
      - windows_amd64_v1
      - windows_arm64_v8.0

    env:
      - CGO_ENABLED=0

    flags:
      - -trimpath
    ldflags:
      - -s -w

    binary: ithiltir-runner

archives:
  - id: node-binaries
    ids:
      - node
    formats:
      - binary
    name_template: 'Ithiltir-node-{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}-{{ .Arch }}'
  - id: runner-binaries
    ids:
      - runner
    formats:
      - binary
    name_template: 'Ithiltir-runner-{{ .Os }}-{{ .Arch }}'
